services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: biolit-postgres
    environment:
      POSTGRES_USER: biolit
      POSTGRES_PASSWORD: biolit
      POSTGRES_DB: biolit
    ports:
      - "5432:5432"
    volumes:
      - biolit_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biolit -d biolit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: biolit-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: biolit-worker
    working_dir: /app
    command: ["uv", "run", "arq", "biolit.worker.settings.WorkerSettings"]
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://biolit:biolit@postgres:5432/biolit
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Langfuse v2 single-container stack for local tracing (optional; API works without it).
  langfuse-db:
    image: postgres:16-alpine
    container_name: biolit-langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - biolit_langfuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    container_name: biolit-langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: biolit-local-nextauth-secret-change-me
      SALT: biolit-local-salt-change-me
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/public/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  biolit_pgdata:
  biolit_langfuse_pgdata:
